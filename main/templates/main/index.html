<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SecAgent-Django</title>
    </head>
    <body>
        <h1>AIエージェントに詐欺サイトかどうか判定してもらう（whoisを使用）</h1>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="user_input" placeholder="調査してほしい怪しいURLを入力" style="width: 400px;">
            <button type="submit">解析する</button>
        </form>

        {% if result %}
            <h2>AIの回答:</h2>
            <p style="white-space: pre-wrap;">{{ result }}</p>
        {% endif %}
    </body>
</html>
